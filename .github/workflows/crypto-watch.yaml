name: Crypto Listing Watcher

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Restore state cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: listing-state.json
          key: listing-state-v1
          fail-on-cache-miss: false
      - name: Create config from secrets
        run: |
          cat > listing-config.json <<'EOF'
          {
            "telegramBotToken": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
            "telegramChatId": "${{ secrets.TELEGRAM_CHAT_ID }}",
            "targetVCs": ["Binance Labs", "a16z", "Pantera Capital", "Animoca Brands", "Paradigm", "Coinbase Ventures", "Dragonfly Capital", "Polychain Capital"]
          }
          EOF
      - name: Run watcher
        run: node listing-watcher.js
      - name: Save state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: listing-state.json
          key: listing-state-v1
