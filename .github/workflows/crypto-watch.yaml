name: Crypto Watchers

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  listing-watcher:
    name: Listing Watcher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: listing-state.json
          key: listing-state-v1
          fail-on-cache-miss: false
      - name: Create config
        run: |
          cat > listing-config.json <<'EOF'
          {"telegramBotToken": "${{ secrets.TELEGRAM_BOT_TOKEN }}", "telegramChatId": "${{ secrets.TELEGRAM_CHAT_ID }}"}
          EOF
      - name: Run
        run: node listing-watcher.js
      - name: Save state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: listing-state.json
          key: listing-state-v1

  mexc-scanner:
    name: MEXC SMA20 Alert
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: mexc-alert-state.json
          key: mexc-alert-state-v1
          fail-on-cache-miss: false
      - name: Create config
        run: |
          cat > listing-config.json <<'EOF'
          {"telegramBotToken": "${{ secrets.TELEGRAM_BOT_TOKEN }}", "telegramChatId": "${{ secrets.TELEGRAM_CHAT_ID }}"}
          EOF
      - name: Run scanner
        run: node mexc-alert.js
      - name: Save state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: mexc-alert-state.json
          key: mexc-alert-state-v1
